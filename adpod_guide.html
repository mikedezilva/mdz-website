## Chapter 1: Welcome to Adpod

### What is Adpod Intelligence?
Adpod Intelligence is a cutting-edge, AI-powered ad targeting and marketing strategy platform. Stop guessing and start knowing your customers. Adpod is designed for founders, marketers, agencies, freelancers, and enterprise teams who need verified, data-backed marketing strategies in seconds.

### The "Truth Engine"
Unlike generic AI tools that rely on static training data and often hallucinate facts, Adpod acts as a "Truth Engine." Every data point in your generated strategy is grounded against live web signals (like Google Search) and on-chain blockchain analytics. We don't guess your audience; we discover them.

### Meet Pod Prime
Throughout the platform, you'll be assisted by **Pod Prime**, our official brand mascot and your strategic AI companion. Pod Prime represents the sharp, data-driven, and slightly rebellious spirit of Adpod.

## Chapter 2: Getting Started

### Creating Your Account & Verifying Email
To get started, sign up with your email address. You must verify your email before you can access the dashboard. 

### Your Home Dashboard
Once logged in, you'll land on your Home Dashboard. Here you can see quick actions, recent campaigns, and access all platform features from the sidebar. 
*[Screenshot: Home Dashboard overview]*

### Installing Adpod as an App (PWA)
Adpod is a Progressive Web App (PWA). You can install it directly to your device for a native-like experience:
- **Desktop (Chrome/Edge):** Click the install icon in the URL bar.
- **iOS (Safari):** Tap "Share" and select "Add to Home Screen."
- **Android (Chrome):** Tap the menu and select "Install app."

Be sure to enable **Push Notifications** when prompted to receive real-time alerts on your campaigns and competitive intel.

### Switching Languages
Adpod fully supports 14 languages! Use the language selector in the navigation bar to switch. When you generate a strategy, the AI will automatically output it in your chosen language.

## Chapter 3: Creating Your First Campaign

### Step 1: Setting Up
Click **New Campaign** to open the creation wizard.
1. **Name & Description:** Give your campaign a clear title and describe your product/service.
2. **Campaign Goal:** Choose from Sales, Leads, Awareness, App Installs, or Conversions.
3. **Region & Audience:** Define where your audience lives and who they are broadly.
4. **Reference Link:** Provide your website URL so the AI can analyze your actual product.
5. **File Uploads:** You can upload images or PDFs (like a pitch deck) to give the AI even more context.
6. **Web3 Contract (Optional):** If you have a token or NFT, paste the contract address here.

### Step 2: Strategic Q&A
Before generating the strategy, the AI will ask you a few hyper-specific **Clarifying Questions**. These are designed to uncover the "tension" and strategic gaps in your brief.
- Answer them manually for the highest accuracy.
- Or, use **Auto-Calibrate (Truth AI)** and let the AI search the web (Reddit, Twitter, forums) to find data-backed answers for you!

### Step 3: Your Strategy Output
Once processed, you'll receive a comprehensive, verified strategy containing:
- **Business Problem & Anti-Persona:** Who you are solving a problem for, and who to explicitly avoid targeting.
- **Demographic Breakdown:** Age, gender, income, and occupations based on real data.
- **Search Intent Clusters:** Real trending queries and keywords your audience is searching for.
- **Verified Media Inventory:** Real, verified URLs for Instagram influencers, YouTube channels, Blogs, and Facebook groups.
- **Competitor Intercepts:** Where your competitors are weak and how to intercept their traffic.
- **Web3 Wallet Insights:** Provided if a contract address was linked.
- **Grounding Sources:** A list of cited URLs backing up the strategy.

## Chapter 4: The Creative Brief

### Understanding Your Brief
Alongside your strategy, Adpod generates a comprehensive Creative Brief. This includes your Brand Archetype, Consumer Insight, Human Truth, Big Idea, Key Message, Content Pillars, Visual Style, and Color Palette.

### The Quality Scoring System
Adpod acts as your Virtual Creative Director. Behind the scenes, the AI scores its own creative drafts to ensure high-quality standards before finalizing the brief.

### Refining Your Brief
Not quite perfect? You can refine individual creative components using natural language feedback. Just tell the AI what you want changed (e.g., "Make the tone more aggressive" or "Change the color palette to cyberpunk neon"), and it will update the specific section.

## Chapter 6: Competitive Intelligence — Watchdog

### Overview of Watchdog
The Watchdog Dashboard is your real-time competitive intelligence command center. It allows you to set up persistent monitoring on key targets.
*[Screenshot: Watchdog Dashboard]*

### Setting Up Monitors
You can track 5 different types of targets:
1. **Intent:** Monitor Google Search keyword trends.
2. **Competitor:** Track a competitor's news, PR, and product changes.
3. **Contract (Web3):** Monitor a token's price, holder count, and verification status.
4. **Wallet (Web3):** Track a target audience wallet's net worth, active chains, and top holdings.
5. **Mint (Web3):** Track NFT mint activity and top minters.

### Counter-Strike System
When Watchdog detects an important change (e.g., a competitor raises prices), it triggers an alert. You can then use the **Counter-Strike** feature to have the AI instantly generate 3 counter-moves (Subtle, Medium, High Aggression) and deploy them directly into a new campaign.

---

## Chapter 7: Nuclear Mode — Competitor Analysis

### What is Nuclear Mode?
Nuclear Mode is our aggressive competitive analysis tool. It ruthlessly analyzes a specific competitor to find their vulnerabilities.

### Running an Analysis
Enter a competitor's URL or product name. Adpod will scour the web for real 1-star reviews, customer complaints, and pricing issues.

### Understanding the Results
You will receive a "VULNERABILITY REPORT" identifying 5-7 real weaknesses, complete with evidence and severity ratings. The system will also generate "Nuclear Option" ad copy designed to directly exploit these weaknesses, along with visual concepts for the creative.

## Chapter 8: Web3 & On-Chain Intelligence

Adpod has first-class Web3 support, monitoring 13+ EVM chains and Solana.

### Key Web3 Features
- **Token Health:** Check any ERC-20 token's metadata, price, market cap, and spam detection status.
- **NFT Analytics:** Get floor prices, lowest listings, and recent sales for any collection.
- **Wallet Watch:** Analyze target wallets to understand net worth, active chains, and top token holdings.
- **Mint Radar:** Monitor live mint transactions and discover top minters.

### Web3 Campaign Insights
If you provide a contract address during campaign creation, your strategy will include **Wallet Personas** (e.g., "NFT flipper"), **On-Chain Triggers** (events that should trigger marketing), and **Top Correlated Assets** (tokens commonly held by your audience).

## Chapter 9: Attribution & Analytics

### The Tracking Pixel
Adpod provides a lightweight, first-party tracking pixel to monitor your campaign performance.
Go to the Analytics Dashboard to get your unique installation snippet. Paste it into the \`<head>\` of your website.

### UTM Tracking & Normalization
The pixel automatically tracks UTM parameters (\`utm_source\`, \`utm_campaign\`, etc.) and intelligently groups them by platform. For example, it knows that \`facebook\`, \`ig\`, and \`meta\` should all roll up under the **Meta** platform dashboard. Supported platforms include Meta, Google, TikTok, X, LinkedIn, and Web3 Ads.

### The Analytics Dashboard
Track your Return on Ad Spend (ROAS), view daily trends on the 30-day chart, and watch a live stream of attribution events (clicks, views, purchases, leads, etc.).
*[Screenshot: Analytics Dashboard]*

### AI Analyst & Simulator
- **AI Analyst:** Chat directly with your analytics data. The embedded AI Analyst can interpret your ROAS and suggest optimizations.
- **Conversion Simulator:** Test your pixel installation by firing simulated events without spending real ad money.

## Chapter 13: Adpod Companion — Browser Extension

### What It Does
The Adpod Companion is a Chrome extension that safely and privately analyzes your browsing history (e.g., the tools you use, the sites you research) to inject hyper-relevant context into your campaign targeting. 

### Privacy First
The extension only activates on Adpod.xyz. It filters out noise (like Google search result pages), deduplicates entries, and extracts the top 50 most relevant URLs to empower your strategy generation.

## Chapter 14: Plans & Pricing

### Understanding Credits
1 Credit = 1 AI Action (e.g., generating a strategy, running a Watchdog scan, refining a brief, or Auto-Calibrating answers).

### Tiers
- **Free:** 5 credits per month. Access to core campaign generation.
- **Plus (\$20/mo):** 100 credits per month. Unlocks Competitor Analysis, Creative Brief generation, and Web3 features.
- **Premium (\$225/mo):** 100 credits per month. Unlocks Adpod Chat v3.1, deep research, and access to premium AI models.

    <script>
        // Extract raw markdown text and unescape template literal sequences
        let rawMarkdown = document.getElementById('raw-markdown').textContent;
        // Fix the escaped characters from the build script
        rawMarkdown = rawMarkdown.replace(/\\`/g, '`').replace(/\\\$/g, '$');

        // Parse with marked.js
        document.getElementById('markdown-container').innerHTML = marked.parse(rawMarkdown);

        // Generate Sidebar Navigation automatically based on h2 tags (Chapters)
        const container = document.getElementById('markdown-container');
        const headers = container.querySelectorAll('h2');
        const navList = document.getElementById('nav-links');

        headers.forEach((header, index) => {
            // Create an ID for linking
            const id = 'section-' + index;
            header.id = id;

            // Create nav item
            const li = document.createElement('li');
            const a = document.createElement('a');
            a.href = '#' + id;
            a.textContent = header.textContent;
            
            // Highlight section on click
            a.addEventListener('click', (e) => {
                document.querySelectorAll('.nav-links a').forEach(link => link.classList.remove('active'));
                a.classList.add('active');
            });

            li.appendChild(a);
            navList.appendChild(li);
        });

        // Set first link as active by default
        if (navList.firstChild) {
            navList.firstChild.querySelector('a').classList.add('active');
        }
    </script>
